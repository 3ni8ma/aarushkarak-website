<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #090909; }
      body { font-family: "Inter", system-ui, sans-serif; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
      .clip { position: absolute; inset: 0; display: grid; place-items: center; }

      .bg-glow {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 50% at 50% 50%, rgba(74, 144, 217, 0.04) 0%, transparent 70%),
          radial-gradient(ellipse 40% 40% at 30% 20%, rgba(74, 144, 217, 0.03) 0%, transparent 60%),
          radial-gradient(ellipse 40% 40% at 70% 80%, rgba(74, 144, 217, 0.02) 0%, transparent 60%);
      }

      .grid-line {
        position: absolute;
        background: rgba(255, 255, 255, 0.04);
      }
      .grid-line.h { height: 1px; left: 0; right: 0; }
      .grid-line.v { width: 1px; top: 0; bottom: 0; }

      .ghost-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-weight: 200;
        font-size: 110px;
        letter-spacing: 24px;
        color: rgba(255, 255, 255, 0.04);
        text-align: center;
        white-space: nowrap;
        width: 100%;
        pointer-events: none;
        z-index: 2;
      }
      .bg-glow { z-index: 0; }
      .grid-line { z-index: 1; }
      .geo-circle { z-index: 1; }
      .accent-line { z-index: 3; }
      .corner-bracket { z-index: 3; }
      .accent-dot { z-index: 3; }

      .accent-line {
        position: absolute;
        height: 1px;
        width: 300px;
        background: linear-gradient(90deg, transparent, rgba(74, 144, 217, 0.3), transparent);
        top: 50%;
        left: 50%;

        pointer-events: none;
      }

      .corner-bracket {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: rgba(74, 144, 217, 0.08);
        border-style: solid;
        border-width: 0;
      }
      .corner-bracket.tl { top: 60px; left: 60px; border-top-width: 1px; border-left-width: 1px; }
      .corner-bracket.tr { top: 60px; right: 60px; border-top-width: 1px; border-right-width: 1px; }
      .corner-bracket.bl { bottom: 60px; left: 60px; border-bottom-width: 1px; border-left-width: 1px; }
      .corner-bracket.br { bottom: 60px; right: 60px; border-bottom-width: 1px; border-right-width: 1px; }

      .geo-circle {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(74, 144, 217, 0.06);
        pointer-events: none;
      }

      .accent-dot {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(74, 144, 217, 0.2);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <section id="hero-bg" class="clip" data-start="0" data-duration="10" data-track-index="1" data-layout-allow-overflow data-layout-allow-occlusion>
        <div class="bg-glow" id="bgGlow"></div>

        <div class="grid-line h" id="gridH1" style="top:25%"></div>
        <div class="grid-line h" id="gridH2" style="top:75%"></div>
        <div class="grid-line v" id="gridV1" style="left:33%"></div>
        <div class="grid-line v" id="gridV2" style="left:66%"></div>

        <div class="geo-circle" id="circle1" style="width:500px;height:500px;top:20%;left:15%"></div>
        <div class="geo-circle" id="circle2" style="width:350px;height:350px;bottom:15%;right:20%"></div>
        <div class="geo-circle" id="circle3" style="width:200px;height:200px;top:60%;left:70%"></div>

        <div class="ghost-text" id="ghostText">AARUSH KARAK</div>

        <div class="accent-line" id="accentLine" style="margin-left:-150px;transform-origin:0 50%"></div>

        <div class="corner-bracket tl" id="bracketTL"></div>
        <div class="corner-bracket tr" id="bracketTR"></div>
        <div class="corner-bracket bl" id="bracketBL"></div>
        <div class="corner-bracket br" id="bracketBR"></div>

        <div class="accent-dot" id="dot1" style="top:20%;left:30%"></div>
        <div class="accent-dot" id="dot2" style="top:70%;left:60%"></div>
        <div class="accent-dot" id="dot3" style="top:40%;left:80%"></div>
        <div class="accent-dot" id="dot4" style="top:80%;left:25%"></div>
        <div class="accent-dot" id="dot5" style="top:30%;left:70%"></div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.set("#ghostText", { autoAlpha: 0 });
      tl.set("#gridH1, #gridH2, #gridV1, #gridV2", { autoAlpha: 0 });
      tl.set("#circle1, #circle2, #circle3", { autoAlpha: 0, scale: 0.8 });
      tl.set("#accentLine", { autoAlpha: 0, scaleX: 0 });
      tl.set("#bracketTL, #bracketTR, #bracketBL, #bracketBR", { autoAlpha: 0 });
      tl.set("#dot1, #dot2, #dot3, #dot4, #dot5", { autoAlpha: 0 });

      tl.to("#bgGlow", { opacity: 1, duration: 0.8 }, 0);

      tl.to("#gridH1", { autoAlpha: 1, duration: 0.6 }, 0.3);
      tl.to("#gridH2", { autoAlpha: 1, duration: 0.6 }, 0.5);
      tl.to("#gridV1", { autoAlpha: 1, duration: 0.6 }, 0.4);
      tl.to("#gridV2", { autoAlpha: 1, duration: 0.6 }, 0.6);

      tl.to("#circle1", { autoAlpha: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 0.8);
      tl.to("#circle2", { autoAlpha: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 1.0);
      tl.to("#circle3", { autoAlpha: 1, scale: 1, duration: 1.2, ease: "power2.out" }, 1.2);

      tl.to("#ghostText", { autoAlpha: 1, duration: 2, ease: "power1.out" }, 1.5);

      tl.to("#accentLine", { autoAlpha: 1, scaleX: 1, duration: 1.4, ease: "power3.out" }, 2.5);

      tl.to("#bracketTL, #bracketTR, #bracketBL, #bracketBR", { autoAlpha: 1, duration: 0.8, ease: "power2.out" }, 3.0);
      tl.to("#dot1, #dot2, #dot3, #dot4, #dot5", { autoAlpha: 1, duration: 0.6, stagger: 0.1 }, 3.5);

      tl.to("#circle1", { scale: 1.05, duration: 4, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4);
      tl.to("#circle2", { scale: 1.03, duration: 5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.5);
      tl.to("#bgGlow", { scale: 1.02, duration: 6, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4);

      tl.to("#ghostText", { opacity: 0.02, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4);
      tl.to("#accentLine", { opacity: 0.15, duration: 3, ease: "sine.inOut", yoyo: true, repeat: 1 }, 4.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
