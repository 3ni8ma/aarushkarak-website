name: Daily Issue Discovery

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Find open issues
        id: find
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const queries = [
              'label:"good first issue" language:typescript state:open',
              'label:"good first issue" language:javascript state:open',
              'label:"good first issue" language:python state:open',
              'label:"help wanted" language:typescript state:open',
              'label:"help wanted" language:javascript state:open',
              'is:issue is:open label:"good first issue" no:assignee',
            ];

            let allIssues = [];
            for (const q of queries) {
              const result = await github.rest.search.issuesAndPullRequests({
                q, sort: 'updated', per_page: 5,
              });
              allIssues.push(...result.data.items);
            }

            const unique = new Map();
            for (const issue of allIssues) {
              if (!unique.has(issue.html_url)) {
                unique.set(issue.html_url, {
                  title: issue.title,
                  url: issue.html_url,
                  repo: issue.repository_url.replace('https://api.github.com/repos/', ''),
                  labels: issue.labels.map(l => l.name).join(', '),
                });
              }
            }

            const issues = [...unique.values()].slice(0, 15);
            core.setOutput('count', String(issues.length));
            core.setOutput('issues', JSON.stringify(issues));

      - name: Send report via email
        env:
          GMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          COUNT: ${{ steps.find.outputs.count }}
          ISSUES_JSON: ${{ steps.find.outputs.issues }}
        run: |
          python3 << 'PYEOF'
          import smtplib, json, os
          from email.message import EmailMessage
          from datetime import datetime, timezone

          msg = EmailMessage()
          msg['Subject'] = f"Daily Issue Discovery Report — {datetime.now(timezone.utc).strftime('%Y-%m-%d')}"
          msg['From'] = 'worldshaans@gmail.com'
          msg['To'] = 'worldshaans@gmail.com'

          issues = json.loads(os.environ.get('ISSUES_JSON', '[]'))
          lines = [
              f"Daily Issue Discovery Report",
              f"{datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}",
              "",
              f"Found {len(issues)} open issues matching your stack.",
              "",
          ]
          for i, issue in enumerate(issues, 1):
              lines.append(f"{i}. [{issue['repo']}] {issue['title']}")
              lines.append(f"   URL: {issue['url']}")
              lines.append(f"   Labels: {issue['labels']}")
              lines.append("")

          msg.set_content('\n'.join(lines))

          password = os.environ.get('GMAIL_PASS', '')
          if not password:
              print("No GMAIL_PASS secret set — skipping email")
          else:
              with smtplib.SMTP_SSL('smtp.gmail.com', 465) as server:
                  server.login('worldshaans@gmail.com', password)
                  server.send_message(msg)
              print(f"Email sent with {len(issues)} issues")
          PYEOF
