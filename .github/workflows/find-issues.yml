name: Daily Issue Discovery

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const queries = [
              'label:"good first issue" language:typescript state:open',
              'label:"good first issue" language:javascript state:open',
              'label:"good first issue" language:python state:open',
              'label:"help wanted" language:typescript state:open',
              'label:"help wanted" language:javascript state:open',
              'is:issue is:open label:"good first issue" no:assignee',
            ];

            let allIssues = [];
            for (const q of queries) {
              const result = await github.rest.search.issuesAndPullRequests({
                q,
                sort: 'updated',
                per_page: 5,
              });
              allIssues.push(...result.data.items);
            }

            const unique = new Map();
            for (const issue of allIssues) {
              if (!unique.has(issue.html_url)) {
                unique.set(issue.html_url, {
                  title: issue.title,
                  url: issue.html_url,
                  repo: issue.repository_url.replace('https://api.github.com/repos/', ''),
                  labels: issue.labels.map(l => l.name).join(', '),
                  created: issue.created_at,
                });
              }
            }

            const issues = [...unique.values()].slice(0, 15);

            let body = `# Daily Issue Discovery — ${new Date().toISOString().split('T')[0]}\n\n`;
            body += `Found **${issues.length}** open issues matching your stack.\n\n`;
            body += `| # | Repo | Issue | Labels |\n`;
            body += `|---|------|-------|--------|\n`;
            issues.forEach((issue, i) => {
              body += `| ${i+1} | ${issue.repo} | [${issue.title}](${issue.url}) | ${issue.labels} |\n`;
            });

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Issue Report — ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['automated-report'],
            });
